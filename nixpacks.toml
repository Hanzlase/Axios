[phases.setup]
nixPkgs = ["nodejs_20", "python310", "python310Packages.pip"]

[phases.install]
cmds = [
  "python -m venv /app/.venv",
  "/app/.venv/bin/pip install --no-cache-dir --upgrade pip setuptools wheel",
  "/app/.venv/bin/pip install --no-cache-dir -r backend/requirements.txt",
  "npm --prefix frontend ci"
]

[phases.build]
cmds = [
  "npm --prefix frontend run build"
]

[start]
cmd = "/app/.venv/bin/python -m uvicorn backend.core.main:app --host 0.0.0.0 --port 8000 & sleep 3 && node frontend/.next/standalone/server.js"

[env]
NEXT_PUBLIC_API_BASE_URL = ""