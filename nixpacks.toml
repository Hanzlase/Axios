[phases.setup]
# python310 (not python310Full) — much smaller closure
# Drop python310Packages.pip and virtualenv — not needed, venv has pip built-in
nixPkgs = ["nodejs_20", "python310"]

[phases.install]
cmds = [
  "python -m venv /app/.venv",
  "/app/.venv/bin/pip install --no-cache-dir --upgrade pip setuptools wheel",
  "/app/.venv/bin/pip install --no-cache-dir -r backend/requirements.txt",
  "npm --prefix frontend ci"
]

[phases.build]
cmds = [
  "npm --prefix frontend run build",

  # ── Slim the image ──────────────────────────────────────────
  # 1. Remove node_modules — Next.js standalone bundles everything it needs
  "rm -rf frontend/node_modules",

  # 2. Remove Next.js build cache (not needed at runtime)
  "rm -rf frontend/.next/cache",

  # 3. Strip Python bytecode and caches from venv
  "find /app/.venv -type d -name '__pycache__' -exec rm -rf {} + 2>/dev/null || true",
  "find /app/.venv -name '*.pyc' -o -name '*.pyo' | xargs rm -f 2>/dev/null || true",

  # 4. Collect Nix garbage — biggest single saving (can free 1–2 GB)
  "nix-collect-garbage -d 2>/dev/null || true"
]

[start]
cmd = "/app/.venv/bin/python -m uvicorn backend.core.main:app --host 0.0.0.0 --port 8000 & sleep 3 && node frontend/.next/standalone/server.js"

[env]
NEXT_PUBLIC_API_BASE_URL = ""