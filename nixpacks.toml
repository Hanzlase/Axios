# Nixpacks config for a single Railway service (no Docker)
# Builds the frontend, then starts backend (port 8000) + frontend (port $PORT).

[phases.setup]
# Keep minimal; nixpacks will bring node/python
nixPkgs = ["nodejs_20", "python310"]

[phases.install]
cmds = [
  "python -m pip install --upgrade pip",
  "python -m pip install -r backend/requirements.txt",
  "npm --prefix frontend ci"
]

[phases.build]
cmds = [
  "npm --prefix frontend run build"
]

[start]
cmd = "python -m uvicorn backend.core.main:app --host 0.0.0.0 --port 8000 & node frontend/.next/standalone/server.js"

[env]
NEXT_PUBLIC_API_BASE_URL = "http://127.0.0.1:8000"
