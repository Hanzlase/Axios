# Railway configuration (single-service)
# NOTE: Railway monorepos are best deployed as two services.
# This config attempts a "single service" setup without Docker.

[build]
# Ensure Node install/build runs (frontend)
builder = "NIXPACKS"

[deploy]
# We need both services, but Railway expects one exposed port.
# We'll expose the Next.js server listening on $PORT, and run the backend on 8000 internally.
startCommand = "python -m uvicorn backend.core.main:app --host 0.0.0.0 --port 8000 & node frontend/.next/standalone/server.js"

[variables]
# Frontend should call backend internally
NEXT_PUBLIC_API_BASE_URL = "http://127.0.0.1:8000"
